name: PR Checks

on:
  pull_request:
    branches: [ main, master ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Run Python tests
        run: pytest
      
      - name: Run linting
        run: ruff check .

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install frontend dependencies
        run: |
          cd web-ui
          npm ci
      
      - name: Build frontend
        run: |
          cd web-ui
          npm run build
      
      - name: Run linting
        run: |
          cd web-ui
          npm run lint

  require-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Check CODEOWNERS approval
        run: |
          echo "Bu PR @senoldogan tarafından onaylanmalıdır."
          echo "This PR must be approved by @senoldogan."
